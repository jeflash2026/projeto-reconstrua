name: CI

# Integração contínua. NÃO faz deploy (servidores e deploy são do dono).
# Entrega: lint + typecheck + testes (incl. conformidade ao Canon) + build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + integration)
        run: pnpm test

      - name: Build
        run: pnpm build

  conformance:
    name: Conformidade ao Canon (gate obrigatório)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Suíte que espelha os "Critérios de Auditoria" do Livro Mestre (R9/G9).
      # Qualquer invariante do Canon sem teste correspondente, ou qualquer teste
      # de conformidade falhando, reprova o merge (decisão do fundador, item 9).
      - name: Conformance suite
        run: pnpm test:conformance
