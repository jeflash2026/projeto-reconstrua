# ─────────────────────────────────────────────────────────────────────────────
# AHRIOS — PRODUÇÃO: Postgres 16 + API completa (webhook + admin + advogado +
# lawyer-experience + monitor/config/go-live) + PORTAIS Next containerizados.
# Plataforma inteira em UM domínio (NPM): / → api:3001 · /admin → portal-admin:3100
# · /advogado → portal-advogado:3200 · /pericias → proxy interno p/ /admin/pericias.
# O compose de dev (docker-compose.yml, só banco) permanece intocado.
# Uso: docker compose -f docker-compose.production.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reconstrua
      POSTGRES_USER: reconstrua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      # A montagem docker-entrypoint-initdb.d foi REMOVIDA (MIG-01): a evolução do
      # schema é feita EXCLUSIVAMENTE pelo serviço `migrate` (forward-only, idempotente,
      # funciona em banco novo E já existente). initdb.d só rodava no 1º boot.
      - ahrios-prod-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reconstrua -d reconstrua']
      interval: 5s
      timeout: 3s
      retries: 20

  # MIG-01: runner de migrations DEDICADO (one-shot). Roda até concluir ANTES da api.
  # A aplicação nunca executa DDL; todo DDL vive nos .sql aplicados por este serviço.
  migrate:
    build:
      context: .
      # MESMA causa raiz da api (e9fec8d): sem target, o Docker builda o ÚLTIMO
      # estágio do Dockerfile (portal-cliente, que não contém apps/api). O runner
      # de migrations vive na imagem runtime — apps/api/dist/migrate/main.js.
      target: runtime
    command: ['node', 'apps/api/dist/migrate/main.js']
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://reconstrua:${POSTGRES_PASSWORD:?}@postgres:5432/reconstrua

  api:
    build:
      context: .
      # CAUSA RAIZ (integração): sem target, o Docker builda o ÚLTIMO estágio do
      # Dockerfile — que, desde a adição dos portais, é portal-advogado. A imagem
      # da api DEVE ser o estágio runtime (node apps/api/dist/production/main.js).
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '${PORT:-3001}'
      DATABASE_URL: postgres://reconstrua:${POSTGRES_PASSWORD:?}@postgres:5432/reconstrua
      PUBLIC_URL: ${PUBLIC_URL:?defina PUBLIC_URL (https)}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL:?}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:?}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:?}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:?}
      OAB_IDENTIFICACAO: ${OAB_IDENTIFICACAO:-}
      CNPJ: ${CNPJ:-}
      ADMIN_ACCESS_SECRET: ${ADMIN_ACCESS_SECRET:-}
      ADVOGADO_ACCESS_SECRET: ${ADVOGADO_ACCESS_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      EVOLUTION_GLOBAL_API_KEY: ${EVOLUTION_GLOBAL_API_KEY:-}
      FOUNDER_ACCESS_SECRET: ${FOUNDER_ACCESS_SECRET:-}
      OFFICIAL_WHATSAPP_NUMBER: ${OFFICIAL_WHATSAPP_NUMBER:-554137989737}
      # PC-R3 — Portal do Cliente: assinatura do link mágico (fail-closed se vazio)
      # e a POLÍTICA única de estimativa (D1) usada na mensagem e no Portal.
      CLIENTE_PORTAL_SECRET: ${CLIENTE_PORTAL_SECRET:-}
      PROCESSING_ESTIMATE_DAYS: ${PROCESSING_ESTIMATE_DAYS:-12}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALLOW_DEGRADED: ${ALLOW_DEGRADED:-false}
    # GO-LIVE-02: healthcheck REAL — a mesma rota pública de saúde da plataforma.
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:'+(process.env.PORT||'3001')+'/production/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      # Só o MAIN é publicado no host — é o que o webhook da Evolution e o proxy
      # externo (NPM) alcançam. Admin/Advogado/LX (PORT+1..+3) continuam escutando
      # DENTRO do container e são alcançados pelos portais/NPM via rede Docker;
      # não precisam (nem devem) ocupar portas do host — evita conflito de porta.
      - '${PORT:-3001}:${PORT:-3001}' # main: webhook + /production/*
    expose:
      # As portas internas DERIVAM de PORT (main.ts: admin=PORT+1, advogado=PORT+2).
      # Na VPS PORT=3101 ⇒ admin=3102, advogado=3103 — defaults alinhados a isso.
      - '${ADMIN_PORT:-3102}' # admin API (interno, rede Docker)
      - '${ADVOGADO_PORT:-3103}' # advogado API (interno, rede Docker)
      - '${LX_PORT:-3004}' # lawyer experience API (interno, rede Docker)

  # ── PORTAIS (Next.js) — plataforma em UM domínio, subpaths /admin e /advogado ─
  # O NPM alcança os portais pela REDE DOCKER compartilhada (npm-net), por NOME de
  # serviço — sem depender do IP do host. Portas publicadas só para diagnóstico
  # local (curl localhost:3100/3200). A página do Perito é /admin/pericias; o NPM
  # serve /pericias com proxy interno preservando a URL no navegador.
  portal-admin:
    build:
      context: .
      target: portal-admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Runtime (não NEXT_PUBLIC — seria inlinado no build): URL interna da API admin.
      # admin = PORT+1 (na VPS PORT=3101 ⇒ 3102).
      API_URL: http://api:${ADMIN_PORT:-3102}
      ADMIN_API_TOKEN: ${ADMIN_ACCESS_SECRET:-}
      FOUNDER_API_TOKEN: ${FOUNDER_ACCESS_SECRET:-}
      ADVOGADO_API_URL: http://api:${ADVOGADO_PORT:-3103}
      ADVOGADO_API_TOKEN: ${ADVOGADO_ACCESS_SECRET:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3100/admin').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - '3100:3100'
    networks:
      - default
      - npm-net

  portal-advogado:
    build:
      context: .
      target: portal-advogado
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Runtime (não NEXT_PUBLIC — seria inlinado no build): URL interna da API advogado.
      # advogado = PORT+2 (na VPS PORT=3101 ⇒ 3103).
      API_URL: http://api:${ADVOGADO_PORT:-3103}
      ADVOGADO_API_TOKEN: ${ADVOGADO_ACCESS_SECRET:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3200/advogado').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - '3200:3200'
    networks:
      - default
      - npm-net

  # ── PORTAL DO CLIENTE (a carta viva da AHRI) — /portal no mesmo domínio ───────
  # Sem segredos próprios: repassa o token do cliente server-side; a API valida.
  portal-cliente:
    build:
      context: .
      target: portal-cliente
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # servidor MAIN (rota /cliente/acompanhamento) — na VPS PORT=3101.
      API_URL: http://api:${PORT:-3001}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3300/portal').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - '3300:3300'
    networks:
      - default
      - npm-net

  # Decreto 2026-07-21: Portal do PERITO — apartado (senha própria; NPM /perito → :3400).
  portal-perito:
    build:
      context: .
      target: portal-perito
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # API admin interna (as rotas da função pericial); o Bearer fica server-side.
      API_URL: http://api:${ADMIN_PORT:-3102}
      ADMIN_API_TOKEN: ${ADMIN_ACCESS_SECRET:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3400/perito/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - '3400:3400'
    networks:
      - default
      - npm-net

volumes:
  ahrios-prod-pgdata:

networks:
  default:
  # Rede EXTERNA do Nginx Proxy Manager — permite proxy por NOME de serviço
  # (portal-admin:3100 / portal-advogado:3200). Descubra o nome da rede com:
  #   docker inspect <container-do-npm> --format '{{json .NetworkSettings.Networks}}'
  npm-net:
    external: true
    name: ${NPM_NETWORK:?defina NPM_NETWORK no .env (nome da rede docker do Nginx Proxy Manager)}
